# SatPass Ops Console 最小運用設定例
# 追尾対象衛星が決まっている場合は、最小構成の時点でTLE本文を入れておきます。
# 実運用では satellites[].tle を最新TLEに差し替えてください。

settings:
  timezone: Asia/Tokyo
  min_elevation_deg: 0.0
  # コマンドAOS/LOSに使う仰角 [deg]
  command_elevation_deg: 5.0

doppler:
  uplink_base_frequency_hz: 145000000
  downlink_base_frequency_hz: 430000000

ground_stations:
  - id: utsunomiya
    name: Utsunomiya GS
    latitude_deg: 36.604900972404
    longitude_deg: 139.88146470024
    altitude_m: 172.0032
    min_elevation_deg: 0.0

satellites:
  - id: iss
    name: ISS (ZARYA)
    color: "#22c55e"
    tle: |
      ISS (ZARYA)
      1 25544U 98067A   26001.50000000  .00010000  00000+0  18000-3 0  9990
      2 25544  51.6400 120.0000 0006000  20.0000 340.0000 15.50000000000000

exports:
  doppler_csv:
    enabled: true
  # doppler_def は config/local.yaml 等の local_setup で必要時のみ enabled: true にします。
